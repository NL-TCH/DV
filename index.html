<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dual Vulnerabilities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="page">

  <header class="hero">
    <div class="hero-text">
      <h1><button type="button" class="home-link" id="homeLink" data-i18n="hero.title"></button></h1>
      <p class="subtitle" data-i18n="hero.subtitle"></p>
    </div>
    <div class="lang-switch" id="langSwitch"></div>
  </header>

  <main class="layout">

    <section class="quiz-panel">
      <div class="card">

        <div id="questionView">
          <p class="intro-line" data-i18n="intro.line"></p>

          <div class="view-tabs">
            <button type="button" class="view-tab active" id="tabOverviewBtn" data-i18n="tabs.overview"></button>
            <button type="button" class="view-tab" id="tabScenariosBtn" data-i18n="tabs.scenarios"></button>
            <button type="button" class="view-tab" id="tabAboutBtn" data-i18n="tabs.about"></button>
            <button type="button" class="view-tab" id="tabDatasetBtn" data-i18n="tabs.dataset"></button>
          </div>

          <div id="overviewTab">
            <p class="step-heading" data-i18n="quiz.heading"></p>
            <p class="step-hint" data-i18n="quiz.hint"></p>

            <div class="quiz-meta">
              <span class="step-label" id="stepLabel"></span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <h2 class="q-title" id="qTitle"></h2>
            <div class="options" id="qOptions"></div>
            <div class="nav-row">
              <button class="btn btn-ghost" type="button" id="btnBack"></button>
              <button class="btn btn-primary" type="button" id="btnNext" disabled></button>
            </div>
          </div>

          <div id="scenariosTab" class="hidden">
            <p class="step-heading" data-i18n="scenario.heading"></p>
            <p class="step-hint" data-i18n="scenario.hint"></p>
          </div>

          <div id="aboutTab" class="hidden">
            <p class="step-heading" data-i18n="about.heading"></p>
            <p class="step-hint" data-i18n="about.teaserHint"></p>
          </div>

          <div id="datasetTab" class="hidden">
            <p class="step-heading" data-i18n="dataset.heading"></p>
            <p class="step-hint" data-i18n="dataset.teaserHint"></p>
          </div>
        </div>

        <div id="resultView" class="hidden" aria-live="polite">
          <p class="answer-summary-tag" id="answerSourceTag"></p>
          <div class="rationale-block hidden" id="rationaleBlock"></div>
          <div class="answer-summary">
            <div id="answerContainer"></div>
          </div>

          <button class="btn btn-ghost" type="button" id="btnRestart" data-i18n="result.restart"></button>
        </div>

        <div id="relevanceView" class="hidden" aria-live="polite">
          <div class="quiz-meta">
            <span class="step-label" id="relevanceStepLabel"></span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="relevanceProgressFill"></div>
          </div>

          <p class="relevance-question-meta" id="relevanceQuestionMeta"></p>
          <h2 class="q-title" id="relevanceQuestionText"></h2>

          <div class="relevance-scale" id="relevanceScale"></div>
          <div class="relevance-scale-labels">
            <span data-i18n="relevance.scaleLow"></span>
            <span data-i18n="relevance.scaleHigh"></span>
          </div>

          <div class="nav-row">
            <button class="btn btn-ghost" type="button" id="relevanceBack"></button>
            <button class="btn btn-primary" type="button" id="relevanceNext" disabled></button>
          </div>
        </div>

        <div id="relevanceResultView" class="hidden" aria-live="polite">
          <p class="answer-summary-tag" data-i18n="relevance.scoreLabel"></p>
          <div class="relevance-summary" id="relevanceSummary"></div>
          <div class="nav-row">
            <button class="btn btn-ghost" type="button" id="btnBackToCaseResult" data-i18n="relevance.backToResult"></button>
            <button class="btn btn-ghost" type="button" id="btnRestartFromRelevance" data-i18n="result.restart"></button>
          </div>
        </div>

      </div>
    </section>

    <section class="diagram-panel">
      <div class="card">

        <div id="quadrantPanel">
          <div class="diagram-hint" id="diagramHint">
            <p class="step-heading" data-i18n="diagram.heading"></p>
            <p class="step-hint" data-i18n="diagram.hint"></p>
          </div>
          <div class="quadrant-wrap">
            <svg id="quadrantSvg" viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg">

              <!-- column headers -->
              <text x="248" y="44" class="axis-label-primary has-tooltip">Doctrinal<title data-i18n="tooltip.doctrinal"></title></text>
              <text x="248" y="70" class="axis-label-secondary">strategy</text>

              <text x="860" y="44" class="axis-label-primary has-tooltip">Material<title data-i18n="tooltip.material"></title></text>
              <text x="860" y="70" class="axis-label-secondary">operational</text>

              <!-- row headers -->
              <text x="20" y="152" class="axis-label-primary has-tooltip">Knowing<title data-i18n="tooltip.knowing"></title></text>
              <text x="20" y="178" class="axis-label-secondary">awareness</text>

              <text x="20" y="768" class="axis-label-primary has-tooltip">Doing<title data-i18n="tooltip.doing"></title></text>
              <text x="20" y="794" class="axis-label-secondary">behavior</text>

              <!-- static grid -->
              <rect x="234" y="122" width="754" height="616" fill="none" stroke="var(--grid-line)" stroke-width="1.4"/>
              <line x1="611" y1="122" x2="611" y2="738" stroke="var(--grid-line)" stroke-width="1.4"/>
              <line x1="234" y1="430" x2="988" y2="430" stroke="var(--grid-line)" stroke-width="1.4"/>

              <!-- dynamic relationship (filled in by QuadrantDiagram) -->
              <g id="resultGroup"></g>
              <g id="resultLabelGroup"></g>

            </svg>
          </div>
          <p class="result-tag" id="resultTag"><span class="swatch" id="resultSwatch"></span><span id="resultTagText"></span></p>
          <div class="result-type-block hidden" id="resultTypeBlock">
            <h2 class="result-title" id="resultTitle"></h2>
            <p class="result-text" id="resultText"></p>
          </div>
        </div>

        <div id="scenarioListPanel" class="hidden">
          <div class="filter-panel">
            <input type="text" class="scenario-search" id="scenarioSearchInput" data-i18n-placeholder="scenario.searchPlaceholder">

            <div class="scenario-toolbar">
              <button type="button" class="toolbar-btn" id="scenarioFilterToggle">
                <svg class="toolbar-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M2 3h12l-4.5 5.5v4L7.5 14v-5.5L2 3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                </svg>
                <span data-i18n="scenario.filtersToggle"></span>
                <span class="filter-group-badge hidden" id="scenarioFilterBadge"></span>
                <span class="toolbar-chevron">▾</span>
              </button>
              <span class="toolbar-divider"></span>
              <div class="toolbar-sort">
                <svg class="toolbar-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M5 3v10M5 3L2.5 5.5M5 3l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M11 13V3M11 13l2.5-2.5M11 13l-2.5-2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <select class="scenario-sort-select" id="scenarioSortSelect">
                  <option value="yearDesc" data-i18n="scenario.sortYearDesc"></option>
                  <option value="yearAsc" data-i18n="scenario.sortYearAsc"></option>
                  <option value="nameAsc" data-i18n="scenario.sortNameAsc"></option>
                  <option value="nameDesc" data-i18n="scenario.sortNameDesc"></option>
                </select>
              </div>
            </div>

            <div class="scenario-filters-panel collapsed" id="scenarioFiltersPanel">
              <div class="filter-group">
                <p class="filter-group-label" data-i18n="scenario.filterMarkerLabel"></p>
                <div class="filter-check-list" id="scenarioMarkerChecks"></div>
              </div>

              <div class="filter-group">
                <p class="filter-group-label" data-i18n="scenario.filterTypeLabel"></p>
                <div class="filter-check-list" id="scenarioTypeChecks"></div>
              </div>

              <div class="filter-group">
                <p class="filter-group-label" data-i18n="scenario.filterYearLabel"></p>
                <div class="year-slider">
                <div class="year-slider-track-wrap">
                  <div class="year-slider-track"></div>
                  <div class="year-slider-range" id="yearSliderRange"></div>
                  <input type="range" class="year-range" id="yearMinRange">
                  <input type="range" class="year-range" id="yearMaxRange">
                </div>
                <div class="year-slider-labels">
                  <span id="yearMinLabel"></span>
                  <span id="yearMaxLabel"></span>
                </div>
                </div>
              </div>
            </div>
          </div>

          <div class="scenario-list" id="scenarioList"></div>
        </div>

        <div id="aboutContentPanel" class="hidden about-content">
          <p class="about-heading" data-i18n="about.heading"></p>
          <p class="about-text" data-i18n="about.intro"></p>

          <p class="about-subheading" data-i18n="about.sub1"></p>
          <p class="about-text" data-i18n="about.text1"></p>

          <p class="about-subheading" data-i18n="about.sub2"></p>
          <p class="about-text" data-i18n="about.text2"></p>

          <p class="about-subheading" data-i18n="about.sub3"></p>
          <p class="about-text" data-i18n="about.text3"></p>

          <p class="about-subheading" data-i18n="about.sub4"></p>
          <p class="about-text" data-i18n="about.text4"></p>
        </div>

        <div id="datasetContentPanel" class="hidden about-content">
          <p class="about-heading" data-i18n="dataset.heading"></p>
          <p class="about-text" data-i18n="dataset.intro"></p>

          <p class="about-subheading" data-i18n="dataset.sub1"></p>
          <p class="about-text" data-i18n="dataset.text1"></p>

          <p class="about-subheading" data-i18n="dataset.sub2"></p>
          <p class="about-text" data-i18n="dataset.text2"></p>

          <p class="about-subheading" data-i18n="dataset.sub3"></p>
          <p class="about-text" data-i18n="dataset.text3"></p>

          <p class="about-subheading" data-i18n="dataset.sub4"></p>
          <p class="about-text" data-i18n="dataset.text4"></p>
          <a class="case-source-link" href="https://zenodo.org/records/14965395" target="_blank" rel="noopener noreferrer" data-i18n="dataset.sourceLink"></a>
        </div>

      </div>
    </section>

    <section class="markers-panel hidden" id="markersPanelSection">
      <div class="card">
        <div class="marker-panel" id="markerPanel"></div>

        <div class="relevance-intro hidden" id="relevanceIntro">
          <p class="step-heading" data-i18n="relevance.heading"></p>
          <p class="step-hint" data-i18n="relevance.hint"></p>
          <button class="btn btn-ghost" type="button" id="btnStartRelevance" data-i18n="relevance.startButton"></button>
        </div>
      </div>
    </section>

  </main>

  <footer class="footnote">
    <p class="footnote-text" data-i18n="footer.text"></p>
    <div class="footer-logos">
      <img class="partner-logo partner-logo-wide" src="assets/ams-logo.png" alt="Antwerp Management School">
      <img class="partner-logo" src="assets/ncsc-logo.jpg" alt="NCSC-NL">
      <img class="partner-logo" src="assets/goudse-logo.png" alt="De Goudse">
    </div>
  </footer>

</div>

<script src="data/strings.js"></script>
<script src="data/content.js"></script>
<script src="js/i18n.js"></script>
<script src="js/lang-switch.js"></script>
<script src="js/config.js"></script>
<script src="js/quadrant.js"></script>
<script src="js/answers.js"></script>
<script src="js/scenario.js"></script>
<script src="js/quiz.js"></script>
<script src="js/relevance.js"></script>
<script src="js/app.js"></script>

</body>
</html>
